<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movistar Sales Agent · ElevenLabs</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@elevenlabs/client@1.8.1/dist/lib.iife.js"></script>
  <!-- Normalizes flat backend error frames (e.g. quota) so the SDK surfaces
       them via onError instead of crashing inside its message handler. -->
  <script src="elevenlabs-error-shim.js"></script>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="status-dot"></span>
        <div>
          <div class="header-title">Movistar · Sales Assistant</div>
          <div class="header-subtitle">ElevenLabs + ADK</div>
        </div>
      </div>
      <div class="header-tagline">chat by text or voice · you choose</div>
    </div>

    <!-- Messages Area -->
    <div class="messages-container" id="messagesContainer">
      <div class="empty-state">
        <div class="empty-state-icon">📞</div>
        <div class="empty-state-text">Start a conversation by typing below or press the voice button to talk to Natalie.</div>
      </div>
    </div>

    <!-- Input Bar — transforms between text and voice mode -->
    <div class="input-bar" id="inputBar">

      <!-- Text mode -->
      <div class="input-wrapper" id="inputWrapper">
        <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
        <button class="button-send" id="sendButton" title="Send message">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>

      <!-- Voice mode (replaces input wrapper in-place) -->
      <div class="voice-bar" id="voiceBar">
        <div class="voice-orb-mini connecting" id="voiceOrb">
          <div class="orb-ring"></div>
          <div class="orb-ring"></div>
          <div class="orb-inner"></div>
        </div>
        <div class="voice-bar-info">
          <div class="voice-bar-status" id="voiceStatus">Connecting...</div>
          <div class="voice-bar-transcript" id="voiceTranscript">Say something…</div>
        </div>
      </div>

      <!-- Voice toggle button (becomes End when active) -->
      <button class="button-voice" id="voiceButton" title="Start voice call">
        <svg class="icon-mic" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
          <line x1="9" y1="21" x2="15" y2="21"/>
        </svg>
        <svg class="icon-stop" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        <span class="voice-btn-label">Voice</span>
      </button>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
